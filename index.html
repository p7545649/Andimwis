<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KEY ADMIN PRO</title>

<style>
body{
    font-family:Arial;
    margin:0;
    background:#f6f2ff;
    padding:20px;
}

.box{
    background:#fff;
    padding:16px;
    border-radius:16px;
    margin-bottom:15px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
}

input,button{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:10px;
    border:1px solid #ddd;
    box-sizing:border-box;
}

button{
    background:#6a4cff;
    color:#fff;
    font-weight:bold;
    border:none;
}

button.danger{background:#ff3b3b}
button.dark{background:#222}
pre{white-space:pre-wrap}
.row{display:flex;gap:10px}
.row button{flex:1}
</style>
</head>

<body>

<h2>🔥 KEY ADMIN PRO (D/H/M)</h2>

<!-- CREATE -->
<div class="box">
<h3>สร้างคีย์</h3>

<input id="amount" type="number" placeholder="จำนวนคีย์">

<input id="days" type="number" placeholder="วัน">
<input id="hours" type="number" placeholder="ชั่วโมง">
<input id="mins" type="number" placeholder="นาที">

<button onclick="createKeys()">CREATE + EXPORT</button>
<button class="dark" onclick="copyKeys()">COPY</button>
<button class="dark" onclick="exportTxt()">EXPORT TXT</button>

<pre id="createdKeys"></pre>
</div>

<!-- SEARCH -->
<div class="box">
<h3>ค้นหาคีย์</h3>
<input id="searchKey" placeholder="KEY">
<button onclick="searchKey()">SEARCH</button>
<pre id="searchResult"></pre>
</div>

<!-- MANAGE -->
<div class="box">
<h3>จัดการคีย์</h3>

<input id="manageKey" placeholder="KEY">

<div class="row">
<button onclick="resetDevice()">RESET</button>
<button class="danger" onclick="deleteKey()">DELETE</button>
</div>

<div class="row">
<button onclick="banKey()">BAN</button>
<button onclick="unbanKey()">UNBAN</button>
</div>
</div>

<!-- ALL -->
<div class="box">
<h3>คีย์ทั้งหมด</h3>
<button onclick="loadKeys()">LOAD ALL</button>
<pre id="allKeys"></pre>
</div>

<!-- LOG -->
<div class="box">
<h3>LOG</h3>
<button onclick="loadLogs()">LOAD LOG</button>
<pre id="logs"></pre>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
doc,
setDoc,
getDoc,
deleteDoc,
updateDoc,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyCrmHYYvKwJbsSp3sbJcmZIjEECmNNgh3c",

authDomain: "reczssa-b396e.firebaseapp.com",

projectId: "reczssa-b396e",

storageBucket: "reczssa-b396e.firebasestorage.app",

messagingSenderId: "1053378935263",

appId: "1:1053378935263:web:54cc8d02c8d0af97442c6a"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOG */
function log(action,key){
setDoc(doc(db,"logs",crypto.randomUUID()),{
action,
key,
time:new Date().toLocaleString()
});
}

/* RANDOM KEY */
function randomKey(){
const c="ABCDEFGHJKLMNPQRSTUVWXYZ123456789";
let k="";
for(let i=0;i<12;i++){
k+=c[Math.floor(Math.random()*c.length)];
}
return k;
}

/* CREATE (D/H/M → ms) */

window.createKeys = async function(){

let amount = parseInt(document.getElementById("amount").value) || 1;

let d = parseInt(document.getElementById("days").value) || 0;
let h = parseInt(document.getElementById("hours").value) || 0;
let m = parseInt(document.getElementById("mins").value) || 0;

let expireMS = ((d*24*60)+(h*60)+m) * 60 * 1000;

if(expireMS <= 0){
alert("ใส่เวลาอย่างน้อย 1 นาที");
return;
}

let out = [];

for(let i=0;i<amount;i++){

let key = randomKey();

let expireDate = Date.now() + expireMS;

await setDoc(doc(db,"keys",key),{
expire: expireDate,
used:false,
device:"",
banned:false
});

log("CREATE", key);

out.push(key);
}

/* FIX OUTPUT */
document.getElementById("createdKeys").innerText = out.join("\n");

}

/* COPY */

window.copyKeys = () => {
const text = document.getElementById("createdKeys").innerText;
navigator.clipboard.writeText(text);
alert("copied");
}

/* EXPORT TXT */
window.exportTxt=()=>{
const blob=new Blob([createdKeys.innerText],{type:"text/plain"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="keys.txt";
a.click();
}

/* SEARCH */

window.searchKey = async () => {

let key = document.getElementById("searchKey").value.trim();

let snap = await getDoc(doc(db,"keys",key));

let out = document.getElementById("searchResult");

if(!snap.exists()){
out.innerText = "NOT FOUND";
return;
}

let d = snap.data();

out.innerText =
`KEY: ${key}
EXPIRE: ${new Date(d.expire).toLocaleString()}
USED: ${d.used}
DEVICE: ${d.device||"NONE"}
BAN: ${d.banned}`;
}

/* DELETE */
window.deleteKey=async()=>{
let key=manageKey.value.trim();
await deleteDoc(doc(db,"keys",key));
log("DELETE",key);
alert("deleted");
}

/* BAN */
window.banKey=async()=>{
let key=manageKey.value.trim();
await updateDoc(doc(db,"keys",key),{banned:true});
log("BAN",key);
alert("banned");
}

/* UNBAN */
window.unbanKey=async()=>{
let key=manageKey.value.trim();
await updateDoc(doc(db,"keys",key),{banned:false});
log("UNBAN",key);
alert("unbanned");
}

/* RESET */
window.resetDevice=async()=>{
let key=manageKey.value.trim();
await updateDoc(doc(db,"keys",key),{
device:"",
used:false
});
log("RESET",key);
alert("reset done");
}

/* LOAD ALL */

window.loadKeys = async () => {

let snap = await getDocs(collection(db,"keys"));

let txt = "";

snap.forEach(d => {
let x = d.data();
txt += `
KEY: ${d.id}
EXP: ${new Date(x.expire).toLocaleString()}
USED: ${x.used}
BAN: ${x.banned}
DEVICE: ${x.device||"NONE"}
----------------
`;
});

document.getElementById("allKeys").innerText = txt;

}

/* LOGS */

window.loadLogs = async () => {

let snap = await getDocs(collection(db,"logs"));

let txt = "";

snap.forEach(d => {
let x = d.data();
txt += `${x.time} | ${x.action} | ${x.key}\n`;
});

document.getElementById("logs").innerText = txt;

}

</script>

</body>
</html>
